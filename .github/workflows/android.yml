name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build APK
        run: .\gradlew.bat assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app\build\outputs\apk\debug\app-debug.apk
